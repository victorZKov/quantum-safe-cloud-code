# trivy-secret.yaml
# Custom secret patterns for Trivy secret scanning
# These extend Trivy's built-in patterns

rules:
  - id: quantumvault-token
    category: credential
    title: QuantumVault API token
    severity: CRITICAL
    regex: "qv_[A-Za-z0-9]{32,64}"
    keywords:
      - qv_
      - quantumvault

  - id: quantumapi-key
    category: credential
    title: QuantumAPI API key
    severity: CRITICAL
    regex: "qapi_[A-Za-z0-9]{32,64}"
    keywords:
      - qapi_
      - quantumapi

  - id: azure-storage-connection-string
    category: credential
    title: Azure Storage connection string
    severity: HIGH
    regex: "DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{88}"
    keywords:
      - AccountKey
      - DefaultEndpointsProtocol
